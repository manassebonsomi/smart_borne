<!DOCTYPE html>

<html>

<head>

    <meta charset="UTF-8">

    <title>
        Profil
    </title>

    <link rel="stylesheet"
          href="assets/css/style.css">

</head>

<body>

<div class="container">

    <h2>
        Création du Profil
    </h2>

    <form id="profileForm">

        <input
            type="text"
            id="nom"
            placeholder="Nom"
            required>

        <input
            type="text"
            id="prenom"
            placeholder="Prénom"
            required>

        <input
            type="number"
            id="age"
            placeholder="Age"
            required>

        <select
            id="niveau">

            <option>
                1ere
            </option>

            <option>
                2eme
            </option>

            <option>
                3eme
            </option>

            <option>
                4eme
            </option>

            <option>
                5eme
            </option>

            <option>
                6eme
            </option>

            <option>
                7eme
            </option>

            <option>
                8eme
            </option>

            <option>
                1ere secondaire
            </option>

            <option>
                2eme secondaire
            </option>

        </select>

        <button type="submit">

            Continuer

        </button>

    </form>

</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/profil.js"></script>

</body>

</html>
