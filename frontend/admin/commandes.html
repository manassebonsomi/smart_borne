<h1>🧠 Console de Commandes IA</h1>

<div class="command-box">

    <input
        type="text"
        id="commandInput"
        placeholder="Tape une commande... ex: CHERCHER ENFANTS KINSHASA">

    <button onclick="sendCommand()">
        Envoyer
    </button>

</div>

<div id="commandResponse"></div>

<hr>

<div id="dynamicForm"></div>

<h2>📜 Historique des Commandes</h2>

<button onclick="loadCommandes()">
    Actualiser
</button>

<table>

    <thead>

        <tr>

            <th>ID</th>

            <th>Commande</th>

            <th>Tokens</th>

            <th>Résultat</th>

            <th>Valide</th>

            <th>Date</th>

        </tr>

    </thead>

    </tbody>
